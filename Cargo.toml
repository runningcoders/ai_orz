[workspace]
members = [
    ".",
    "frontend",
]
resolver = "2"

[package]
name = "ai_orz"
version = "0.1.0"
edition = "2021"

[dependencies]
tokio = { version = "1", features = ["full"] }
axum = "0.7"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rusqlite = { version = "0.31", features = ["bundled"] }
toml = "0.8"
tower-http = { version = "0.5", features = ["fs"] }
rig-core = { version = "0.33.0", features = ["openai", "ollama", "tokio"] }
async-trait = "0.1"
