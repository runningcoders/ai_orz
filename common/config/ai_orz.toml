# ai_orz 配置文件
#
# 这个文件在程序首次运行时会从二进制嵌入解压生成
# 你可以修改这里的配置来自定义程序行为
#
# 环境变量会覆盖这里的配置
# 基础数据目录固定为 .ai_orz/，不需要配置

# 服务器配置
[server]
# 监听地址
listen_addr = "0.0.0.0:3000"

# 数据库配置
[database]
# SQLite 数据库文件名（相对于 .ai_orz/）
db_file_name = "ai_orz.db"

# 前端配置
[frontend]
# 静态文件目录
dist_dir = "dist"

# 日志配置
[logging]
# 是否启用文件日志
enable_file_log = true
# 日志文件目录（相对于 .ai_orz/）
log_subdir = "logs"

# JWT配置
[jwt]
# JWT签名密钥（生产环境务必修改！也可以通过环境变量 JWT_SECRET 设置
# secret = "your-secret-key-here"
# JWT默认过期时间（小时），默认 7 天（168小时），也可以通过环境变量 JWT_EXPIRY_HOURS 设置
# default_expiry_hours = 168

# 附件存储配置（消息附件、Agent 生成的文件等都存储在这里
[attachment]
# 附件存储目录（相对于 .ai_orz/）
# 附件文件会按日期存储在此目录下：YYYYMMDD/filename（一层目录更扁平）
attachment_subdir = "attachment"
