# ai_orz 配置文件
#
# 这个文件在程序首次运行时会从二进制嵌入解压生成
# 你可以修改这里的配置来自定义程序行为

# 基础数据存储路径
# 所有数据文件（SQLite数据库、日志、记忆文件等）都会存储在此目录下
base_data_path = "data"

# 服务器配置
[server]
# 监听地址
listen_addr = "0.0.0.0:3000"
# CORS 允许的来源，为空则允许所有
# allowed_origins = []

# 日志配置
[logging]
# 是否启用文件日志
enable_file_log = true
# 日志文件目录（相对于 base_data_path）
log_subdir = "logs"
